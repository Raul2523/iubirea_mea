<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iubirea Mea - Galerie cu mesaje personale și muzică</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #ffdde1 0%, #ffb7c5 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        /* Floating Hearts Background */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -20px;
            font-size: 1.5rem;
            color: rgba(255, 80, 120, 0.6);
            animation: floatHeart linear forwards;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-110vh) rotate(25deg);
                opacity: 0;
            }
        }

        /* Main Card */
        .main-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 248, 250, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            width: 100%;
            max-width: 900px;
            padding: 1.8rem 2rem 2.5rem;
            transition: all 0.3s ease;
        }

        /* Editable Text */
        .love-title {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .editable-text {
            font-size: 1.8rem;
            font-weight: 600;
            background: rgba(255, 220, 230, 0.8);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            max-width: 100%;
            color: #a1344b;
            border: 2px dashed #ff90a5;
            transition: 0.2s;
            cursor: text;
            letter-spacing: -0.2px;
            backdrop-filter: blur(2px);
            word-break: break-word;
        }

        .editable-text:hover {
            background: #fff0f3;
            border-color: #ff5e7e;
        }

        .editable-text:focus {
            outline: none;
            background: white;
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.2);
        }

        .edit-hint {
            font-size: 0.75rem;
            color: #c95a74;
            margin-top: 0.4rem;
            opacity: 0.7;
            font-weight: 500;
        }

        /* Gallery with arrows */
        .gallery-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 1.2rem;
            flex-wrap: wrap;
        }

        .arrow-btn {
            background: #ff9aae;
            border: none;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            font-size: 2.2rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-btn:hover {
            background: #ff6b8b;
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }

        .arrow-btn:active {
            transform: scale(0.96);
        }

        .image-frame {
            background: #ffeef2;
            border-radius: 40px;
            padding: 1rem;
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.2), inset 0 1px 2px white;
            max-width: 520px;
            width: 100%;
        }

        .main-img {
            width: 100%;
            max-height: 480px;
            object-fit: contain;
            border-radius: 28px;
            background: #fff3f5;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }

        .photo-counter {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            background: #ffd9e2;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin: 0 auto 1rem auto;
            color: #b13e5a;
        }

        .footer-love {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #b85a74;
            border-top: 1px solid #ffc0ce;
            padding-top: 1.2rem;
            font-weight: 500;
        }

        /* Music Button */
        .music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #ff4d6d;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: none;
            color: white;
            font-size: 28px;
        }
        .music-btn:hover {
            transform: scale(1.08);
            background: #ff1f4a;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        @media (max-width: 680px) {
            .main-card { padding: 1.2rem; }
            .editable-text { font-size: 1.3rem; padding: 0.5rem 1rem; }
            .arrow-btn { width: 48px; height: 48px; font-size: 1.8rem; }
            .image-frame { padding: 0.6rem; }
            .music-btn { width: 50px; height: 50px; font-size: 24px; bottom: 20px; right: 20px; }
        }
        @media (max-width: 480px) {
            .gallery-container { gap: 0.5rem; }
            .editable-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="heart-bg" id="heartBg"></div>

<div class="main-card">
    <div class="love-title">
        <div class="editable-text" contenteditable="true" id="editableTitle">
            Încărcare...
        </div>
        <div class="edit-hint">
            <i class="fas fa-pen-fancy"></i> 
        </div>
    </div>

    <div class="gallery-container">
        <button class="arrow-btn" id="prevBtn" aria-label="Anterioară">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="image-frame">
            <img id="galleryImage" class="main-img" alt="Poză cu iubita">
        </div>
        <button class="arrow-btn" id="nextBtn" aria-label="Următoarea">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <div style="text-align: center;">
        <span class="photo-counter" id="photoCounter">0 / 0</span>
    </div>

    <div class="footer-love">
        <i class="fas fa-heart" style="color: #ff4d6d;"></i> Fiecare imagine are povestea ei  <i class="fas fa-heart" style="color: #ff4d6d;"></i>
    </div>
</div>

<button class="music-btn" id="musicToggleBtn">
    <i class="fas fa-music"></i>
</button>

<script>
    // ======================== POZELE ȘI TEXTELE ========================
    const galleryImages = [
        "poza1.jpeg",
        "poza2.jpeg",
        "poza3.jpeg",
        "poza4.jpeg",
        "poza5.jpeg",
        "poza6.jpeg",
        "poza7.jpeg",
        "poza8.jpeg",
        "poza9.jpeg",
        "poza10.jpeg",
        "poza11.jpeg",
        "poza12.jpeg"
    ];

    const galleryTexts = [
        "Prima noastră amintire ❤️",
        "Zâmbetul tău mă face fericită 🌸",
        "Împreună suntem mai puternici 💪",
        "Această poză îmi amintește de ziua aceea specială ✨",
        "Privirea ta îmi vorbește 🌹",
        "Fiecare clipă cu tine e un cadou 🎁",
        "Te iubesc mai mult decât pot spune 💕",
        "Ești soarele meu în zilele ploioase ☀️",
        "Mâna ta în a mea, acasă 🤝",
        "Râsul tău e melodia mea preferată 🎵",
        "Tu ești iubirea vieții mele 💖"
    ];

    // ======================== MUZICĂ ========================
    // 🔽 AICI PUNE NUMELE FIȘIERULUI TĂU MP3 (copiat în același folder cu HTML-ul)
    // Exemplu: "melodie.mp3" sau "2026-04-18 20-25-23.mp3"
    const musicFile = "2026-04-18 20-25-23.mp3";   // <--- MODIFICĂ AICI
    
    // Alternativ, dacă vrei neapărat calea completă (mai puțin recomandat):
    // const musicFile = "file:///C:/Users/MCO/Downloads/2026-04-18%2020-25-23.mp3";
    
    const audio = new Audio();
    audio.src = musicFile;
    audio.loop = true;
    audio.volume = 0.6;

    const musicBtn = document.getElementById('musicToggleBtn');
    let isPlaying = false;

    // Funcție pentru a porni/opri
    function toggleMusic() {
        if (isPlaying) {
            audio.pause();
            musicBtn.innerHTML = '<i class="fas fa-music"></i>';
        } else {
            audio.play().catch(error => {
                console.error("Eroare redare:", error);
                alert("❌ Nu s-a putut reda melodia. Asigură-te că fișierul MP3 se află în același folder cu această pagină HTML.\n\nNume fișier așteptat: " + musicFile);
            });
            musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }
        isPlaying = !isPlaying;
    }

    musicBtn.addEventListener('click', toggleMusic);

    // Încercare autoplay (dacă browserul permite)
    audio.play().then(() => {
        isPlaying = true;
        musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
    }).catch(e => {
        console.log("Autoplay blocat. Utilizatorul trebuie să dea click pe butonul muzical.");
        // Nu afișăm alert aici pentru a nu deranja, doar în caz de eroare la click.
    });
    
    // Eveniment pentru a detecta când fișierul nu există (eroare de încărcare)
    audio.addEventListener('error', (e) => {
        console.warn("Fișierul audio nu a putut fi încărcat. Verifică calea:", musicFile);
        // Schimbăm butonul pentru a indica eroare (opțional)
        musicBtn.style.opacity = "0.7";
        musicBtn.title = "Eroare: fișierul MP3 nu a fost găsit. Pune-l în același folder cu HTML-ul.";
    });
    // ======================== SFÂRȘIT MUZICĂ ========================

    // ------------------ GALERIE (COD NEMODIFICAT) ------------------
    let currentIndex = 0;
    const imgElement = document.getElementById('galleryImage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const photoCounterSpan = document.getElementById('photoCounter');
    const editableDiv = document.getElementById('editableTitle');

    function saveAllTexts() {
        localStorage.setItem('love_gallery_texts', JSON.stringify(galleryTexts));
    }

    function loadSavedTexts() {
        const saved = localStorage.getItem('love_gallery_texts');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length === galleryImages.length) {
                    for (let i = 0; i < parsed.length; i++) galleryTexts[i] = parsed[i];
                } else if (Array.isArray(parsed) && parsed.length < galleryImages.length) {
                    for (let i = 0; i < parsed.length; i++) galleryTexts[i] = parsed[i];
                }
            } catch(e) {}
        }
    }

    function renderCurrent() {
        if (!galleryImages.length) {
            imgElement.src = "https://placehold.co/600x400/FFC0CB/white?text=💕+Adaugă+poze+în+cod+💕";
            photoCounterSpan.innerText = `0 / 0`;
            editableDiv.innerText = "Adaugă imagini în array";
            return;
        }
        if (currentIndex >= galleryImages.length) currentIndex = galleryImages.length - 1;
        if (currentIndex < 0) currentIndex = 0;
        imgElement.src = galleryImages[currentIndex];
        photoCounterSpan.innerText = `${currentIndex+1} / ${galleryImages.length}`;
        if (currentIndex < galleryTexts.length && galleryTexts[currentIndex]) {
            editableDiv.innerText = galleryTexts[currentIndex];
        } else {
            editableDiv.innerText = "Scrie aici un mesaj special pentru această poză 💌";
            if (currentIndex >= galleryTexts.length) galleryTexts[currentIndex] = editableDiv.innerText;
        }
    }

    function saveCurrentText() {
        const newText = editableDiv.innerText;
        if (currentIndex < galleryTexts.length) {
            galleryTexts[currentIndex] = newText;
        } else {
            while (galleryTexts.length <= currentIndex) galleryTexts.push("");
            galleryTexts[currentIndex] = newText;
        }
        saveAllTexts();
    }

    function nextImage() {
        if (galleryImages.length === 0) return;
        saveCurrentText();
        currentIndex = (currentIndex + 1) % galleryImages.length;
        renderCurrent();
    }

    function prevImage() {
        if (galleryImages.length === 0) return;
        saveCurrentText();
        currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
        renderCurrent();
    }

    prevBtn.addEventListener('click', prevImage);
    nextBtn.addEventListener('click', nextImage);
    editableDiv.addEventListener('blur', saveCurrentText);
    editableDiv.addEventListener('input', saveCurrentText);

    loadSavedTexts();
    while (galleryTexts.length < galleryImages.length) galleryTexts.push("💖 O amintire frumoasă 💖");
    if (galleryTexts.length > galleryImages.length) galleryTexts.length = galleryImages.length;
    renderCurrent();
    saveAllTexts();

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { prevImage(); e.preventDefault(); }
        else if (e.key === 'ArrowRight') { nextImage(); e.preventDefault(); }
    });

    // Fundal cu inimi
    function createFloatingHeart() {
        const heartDiv = document.createElement('div');
        heartDiv.classList.add('floating-heart');
        const heartIcons = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌹'];
        const randomHeart = heartIcons[Math.floor(Math.random() * heartIcons.length)];
        heartDiv.innerHTML = randomHeart;
        const size = Math.floor(Math.random() * 25 + 15);
        heartDiv.style.fontSize = size + 'px';
        heartDiv.style.left = Math.random() * 100 + '%';
        heartDiv.style.animationDuration = Math.random() * 5 + 4 + 's';
        heartDiv.style.opacity = Math.random() * 0.6 + 0.3;
        document.getElementById('heartBg').appendChild(heartDiv);
        setTimeout(() => { if(heartDiv.remove) heartDiv.remove(); }, 9000);
    }
    setInterval(() => {
        createFloatingHeart();
        if (Math.random() > 0.7) setTimeout(() => createFloatingHeart(), 150);
    }, 700);
</script>
</body>
</html>
